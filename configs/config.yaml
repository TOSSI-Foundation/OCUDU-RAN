cu_cp:
  amf:
    addrs: 192.168.70.132
    port: 38412
    bind_addrs: 192.168.1.115
    supported_tracking_areas:
      - tac: 1
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
ru_sdr:
  device_driver: zmq
  device_args: tx_port=tcp://127.0.0.1:4556,rx_port=tcp://127.0.0.1:4557
  srate: 61.44
  tx_gain: 80
  rx_gain: 40

cell_cfg:
  dl_arfcn: 632628
  band: 78
  channel_bandwidth_MHz: 40
  common_scs: 30
  plmn: "00101"
  tac: 1
  pci: 1
  prach:
    # Multi-UE: many UEs contend on PRACH; a straggler whose preamble loses an
    # occasion needs many retries (with random backoff) to land on a clean one.
    # Default 7 is too few at scale; 200 lets stragglers keep trying.
    # NOTE: do NOT set ra_resp_window here — an explicit 10 closes the RAR
    # window before the gNB (which postpones RAR alloc for TDD slot availability)
    # can send it, breaking RAR reception for ALL UEs. Leave it auto-derived.
    preamble_trans_max: 200

log:
  filename: gnb.log
  all_level: debug

pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_ngap.pcap
